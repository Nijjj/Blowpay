name: Build APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android command line tools
        shell: bash
        run: |
          set -eux
          mkdir -p "$HOME/android-sdk/cmdline-tools"
          cd "$HOME/android-sdk/cmdline-tools"
          curl -fsSL -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools.zip
          rm -f commandlinetools.zip
          mkdir -p latest
          mv cmdline-tools/* latest/

      - name: Set Android env
        shell: bash
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$HOME/android-sdk/platform-tools" >> "$GITHUB_PATH"

      - name: Install SDK packages
        shell: bash
        run: |
          set -eux
          sdkmanager --sdk_root="$HOME/android-sdk" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Accept licenses
        shell: bash
        run: |
          set +e
          yes | sdkmanager --sdk_root="$HOME/android-sdk" --licenses >/dev/null 2>&1
          true

      - name: Install Gradle
        shell: bash
        run: |
          set -eux
          cd "$HOME"
          curl -fsSL -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip
          rm -f gradle.zip
          echo "$HOME/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        shell: bash
        run: |
          set -eux
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
